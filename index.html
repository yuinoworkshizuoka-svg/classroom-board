<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意見を送る</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f5f5f0;min-height:100vh;display:flex;flex-direction:column;}
.nav{padding:14px 20px;background:#fff;border-bottom:1px solid #e8e8e0;display:flex;align-items:center;gap:10px;}
.nav-title{font-size:17px;font-weight:700;color:#1a1a1a;}
.nav-sub{font-size:13px;color:#888;}
.main{flex:1;padding:20px;display:flex;justify-content:center;align-items:flex-start;}
.form-card{background:#fff;border-radius:14px;border:1px solid #e8e8e0;padding:22px;width:100%;max-width:500px;}
.info-bar{background:#f0f0ea;border-radius:8px;padding:8px 14px;font-size:13px;color:#555;margin-bottom:16px;}
.info-bar.error{background:#fee2e2;color:#991b1b;}
.info-bar.success{background:#dcfce7;color:#166534;}
.form-row{margin-bottom:16px;}
.form-label{font-size:13px;color:#666;margin-bottom:6px;display:block;font-weight:500;}
input,select,textarea{font-size:15px;padding:10px 13px;border-radius:9px;border:1px solid #ddd;background:#fff;color:#1a1a1a;width:100%;outline:none;transition:border-color 0.15s;}
input:focus,select:focus,textarea:focus{border-color:#93c5fd;}
textarea{height:100px;resize:vertical;}
.img-preview{margin-top:8px;max-width:100%;max-height:120px;border-radius:8px;display:none;}
.btn{font-size:15px;padding:12px 16px;border-radius:9px;border:none;background:#dbeafe;color:#1e40af;cursor:pointer;font-weight:700;width:100%;transition:all 0.15s;}
.btn:hover{background:#bfdbfe;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #bfdbfe;border-top-color:#1e40af;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
.sent-view{text-align:center;padding:30px 0;}
.sent-icon{width:56px;height:56px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.sent-icon svg{width:28px;height:28px;}
</style>
</head>
<body>
<div class="nav">
  <div>
    <div class="nav-title">意見を送る</div>
    <div class="nav-sub">クラス意見ボード</div>
  </div>
</div>
<div class="main">
  <div class="form-card">
    <div id="main-form">
      <div class="info-bar" id="status-bar">セッションを読み込み中...</div>
      <div class="form-row">
        <label class="form-label">名前（任意）</label>
        <input id="s-name" placeholder="名前またはニックネーム" />
      </div>
      <div class="form-row">
        <label class="form-label">セッション</label>
        <select id="s-session"><option value="">-- 選択してください --</option></select>
      </div>
      <div class="form-row">
        <label class="form-label">意見・コメント</label>
        <textarea id="s-text" placeholder="ここに意見を入力してください"></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">画像（任意）</label>
        <input type="file" accept="image/*" id="s-img" onchange="previewImg(event)" style="padding:6px;"/>
        <img id="img-preview" class="img-preview" />
      </div>
      <button class="btn" onclick="submitOpinion()" id="submit-btn">送信する</button>
    </div>
    <div id="sent-view" class="sent-view" style="display:none;">
      <div class="sent-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <p style="font-size:17px;font-weight:700;color:#166534;margin-bottom:8px;">送信しました！</p>
      <p style="font-size:14px;color:#888;margin-bottom:20px;">ご意見ありがとうございます。</p>
      <button class="btn" onclick="resetForm()" style="max-width:200px;margin:0 auto;">続けて送る</button>
    </div>
  </div>
</div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbw44d2Bbnr2fFIpEINYWK6CViujsDyAsTHadq_09-MzEp7xBBV9yM3K6s3DiSz4HTs/exec';
let imgB64=null;
let sessionRefreshTimer=null;

async function api(params){
  const r=await fetch(GAS+'?'+new URLSearchParams(params));
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

async function loadSessions(){
  try{
    const d=await api({action:'getSessions'});
    const sessions=d.sessions||[];
    const sel=document.getElementById('s-session');
    const prev=sel.value;

    // 現在の選択肢と比較して変化があった場合のみ更新
    const currentIds=Array.from(sel.options).slice(1).map(o=>o.value);
    const newIds=sessions.map(s=>s.id);
    const changed=JSON.stringify(currentIds)!==JSON.stringify(newIds);

    if(changed){
      sel.innerHTML='<option value="">-- 選択してください --</option>';
      sessions.forEach(s=>{
        const o=document.createElement('option');
        o.value=s.id;o.textContent=s.name;sel.appendChild(o);
      });
      // 以前選択していたセッションがまだ存在すれば復元
      if(prev && newIds.includes(prev)){
        sel.value=prev;
      } else if(prev && !newIds.includes(prev)){
        // 選択中のセッションが削除された場合
        sel.value='';
        setStatus('選択中のセッションが終了しました。別のセッションを選んでください。','error');
        return;
      }
    }

    setStatus(sessions.length
      ? 'セッションを選んで意見を送ってください。'
      : 'まだセッションがありません。先生が作成するまでお待ちください。', '');
  }catch(e){
    setStatus('接続エラーが発生しました。ページを再読み込みしてください。','error');
  }
}

function setStatus(msg,type){
  const el=document.getElementById('status-bar');
  el.textContent=msg;
  el.className='info-bar'+(type?' '+type:'');
}

function previewImg(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{imgB64=ev.target.result;const p=document.getElementById('img-preview');p.src=imgB64;p.style.display='block';};
  r.readAsDataURL(f);
}

async function submitOpinion(){
  const sid=document.getElementById('s-session').value;
  const text=document.getElementById('s-text').value.trim();
  const name=document.getElementById('s-name').value.trim();
  if(!sid){setStatus('セッションを選択してください','error');return;}
  if(!text&&!imgB64){setStatus('意見または画像を入力してください','error');return;}
  const btn=document.getElementById('submit-btn');
  btn.innerHTML='<span class="spin"></span>送信中...';btn.disabled=true;
  try{
    await api({action:'addOpinion',sessionId:sid,name:name||'匿名',text,image:imgB64||''});
    document.getElementById('main-form').style.display='none';
    document.getElementById('sent-view').style.display='block';
  }catch(e){setStatus('送信に失敗しました。もう一度お試しください。','error');}
  btn.innerHTML='送信する';btn.disabled=false;
}

function resetForm(){
  document.getElementById('s-text').value='';
  document.getElementById('s-img').value='';
  document.getElementById('img-preview').style.display='none';
  imgB64=null;
  document.getElementById('sent-view').style.display='none';
  document.getElementById('main-form').style.display='block';
}

// 初回読み込み＋10秒ごとにセッション一覧を更新
loadSessions();
sessionRefreshTimer=setInterval(loadSessions, 10000);
</script>
</body>
</html>
