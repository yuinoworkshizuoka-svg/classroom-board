<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教師用ボード</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f5f5f0;min-height:100vh;}
.nav{display:flex;gap:8px;padding:12px 18px;background:#fff;border-bottom:1px solid #e8e8e0;align-items:center;position:sticky;top:0;z-index:100;}
.nav-title{font-size:16px;font-weight:700;color:#1a1a1a;flex:1;}
.nav-badge{font-size:12px;background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:20px;font-weight:600;}
.main{padding:16px;max-width:960px;margin:0 auto;}
.info-bar{background:#f0f0ea;border-radius:8px;padding:8px 14px;font-size:13px;color:#555;margin-bottom:14px;}
.info-bar.error{background:#fee2e2;color:#991b1b;}
.info-bar.success{background:#dcfce7;color:#166534;}
.row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.chips-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;min-height:28px;align-items:center;}
.chip-wrap{display:flex;align-items:center;gap:0;}
.chip{font-size:12px;padding:5px 12px;border-radius:20px 0 0 20px;border:1px solid #ddd;border-right:none;cursor:pointer;background:#fff;color:#555;transition:all 0.15s;}
.chip.active{background:#dbeafe;color:#1e40af;border-color:#bfdbfe;font-weight:700;}
.chip-del{font-size:11px;padding:5px 8px;border-radius:0 20px 20px 0;border:1px solid #ddd;border-left:none;cursor:pointer;background:#fff;color:#bbb;transition:all 0.15s;line-height:1;}
.chip-del:hover{background:#fee2e2;color:#991b1b;border-color:#fca5a5;}
.chip.active + .chip-del{border-color:#bfdbfe;}
.board{min-height:440px;background:#fff;border-radius:12px;border:1px solid #e8e8e0;position:relative;overflow:hidden;padding:12px;}
.board-empty{display:flex;align-items:center;justify-content:center;height:400px;color:#bbb;font-size:14px;}
.sticky{position:absolute;width:164px;min-height:84px;border-radius:9px;padding:10px 13px;font-size:13px;line-height:1.55;word-break:break-word;cursor:grab;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.sticky:active{cursor:grabbing;}
.sticky-name{font-size:11px;font-weight:700;margin-bottom:4px;opacity:0.6;}
.sticky img{width:100%;border-radius:5px;margin-top:6px;max-height:84px;object-fit:cover;}
.board-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.count{font-size:12px;color:#888;}
input{font-size:14px;padding:8px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;outline:none;transition:border-color 0.15s;}
input:focus{border-color:#93c5fd;}
.btn{font-size:13px;padding:7px 15px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;font-weight:500;transition:all 0.15s;white-space:nowrap;}
.btn:hover{background:#f0f0ea;}
.btn.primary{background:#dbeafe;color:#1e40af;border-color:transparent;}
.btn.primary:hover{background:#bfdbfe;}
.btn.danger{background:#fee2e2;color:#991b1b;border-color:transparent;}
.btn.sm{padding:4px 10px;font-size:12px;}
</style>
</head>
<body>
<div class="nav">
  <span class="nav-title">クラス意見ボード</span>
  <span class="nav-badge">教師用</span>
</div>
<div class="main">
  <div class="info-bar" id="teacher-status">読み込み中...</div>
  <div class="row">
    <input id="sname" placeholder="セッション名を入力" style="flex:1;min-width:180px;" onkeydown="if(event.key==='Enter')createSession()"/>
    <button class="btn primary" onclick="createSession()">セッション作成</button>
  </div>
  <div class="chips-row" id="session-chips"></div>
  <div class="board" id="board">
    <div class="board-empty" id="board-empty">セッションを選択すると意見が表示されます</div>
  </div>
  <div class="board-foot">
    <span class="count" id="op-count"></span>
    <button class="btn danger sm" id="clear-btn" onclick="clearOpinions()" style="display:none;">意見をリセット</button>
  </div>
</div>
<script>
const GAS='https://script.google.com/macros/s/AKfycbw44d2Bbnr2fFIpEINYWK6CViujsDyAsTHadq_09-MzEp7xBBV9yM3K6s3DiSz4HTs/exec';
const COLORS=[
  {bg:'#fef9c3',tc:'#713f12'},{bg:'#dcfce7',tc:'#14532d'},
  {bg:'#dbeafe',tc:'#1e3a8a'},{bg:'#fce7f3',tc:'#831843'},
  {bg:'#e0f2fe',tc:'#0c4a6e'},{bg:'#ede9fe',tc:'#4c1d95'},
  {bg:'#ffedd5',tc:'#7c2d12'},{bg:'#d1fae5',tc:'#064e3b'},
];
let sessions=[],activeId=null,knownIds=new Set(),refreshTimer=null;

async function api(params){
  const r=await fetch(GAS+'?'+new URLSearchParams(params));
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

async function loadSessions(){
  try{
    const d=await api({action:'getSessions'});
    sessions=d.sessions||[];
    renderChips();
    setStatus('接続済み — セッションを選択または作成してください','');
  }catch(e){setStatus('接続エラー：'+e.message,'error');}
}

function setStatus(msg,type){
  const el=document.getElementById('teacher-status');
  el.textContent=msg;el.className='info-bar'+(type?' '+type:'');
}

function renderChips(){
  const c=document.getElementById('session-chips');c.innerHTML='';
  sessions.forEach(s=>{
    const wrap=document.createElement('div');
    wrap.className='chip-wrap';
    const ch=document.createElement('div');
    ch.className='chip'+(s.id===activeId?' active':'');
    ch.textContent=s.name;
    ch.onclick=()=>selectSession(s.id);
    const del=document.createElement('div');
    del.className='chip-del';
    del.textContent='✕';
    del.title='このセッションを削除';
    del.onclick=(e)=>{e.stopPropagation();deleteSession(s.id,s.name);};
    wrap.appendChild(ch);wrap.appendChild(del);
    c.appendChild(wrap);
  });
}

function selectSession(id){
  activeId=id;knownIds=new Set();
  document.getElementById('board').querySelectorAll('.sticky').forEach(e=>e.remove());
  document.getElementById('op-count').textContent='';
  document.getElementById('board-empty').style.display='flex';
  document.getElementById('clear-btn').style.display='';
  renderChips();clearInterval(refreshTimer);
  loadOpinions();refreshTimer=setInterval(loadOpinions,5000);
}

async function loadOpinions(){
  if(!activeId)return;
  try{
    const d=await api({action:'getOpinions',sessionId:activeId});
    const opinions=d.opinions||[];
    const board=document.getElementById('board');
    const bW=board.offsetWidth||700,bH=Math.max(board.offsetHeight,440);
    opinions.forEach((op,i)=>{
      if(knownIds.has(op.id))return;
      knownIds.add(op.id);
      const c=COLORS[i%COLORS.length];
      const el=document.createElement('div');
      el.className='sticky';
      el.style.background=c.bg;el.style.color=c.tc;
      el.style.left=(30+op.x*Math.max(20,bW-190))+'px';
      el.style.top=(16+op.y*Math.max(20,bH-130))+'px';
      el.innerHTML=`<div class="sticky-name">${esc(op.name||'匿名')}</div><div>${esc(op.text||'')}</div>${op.image?`<img src="${op.image}"/>`:''}`;
      drag(el);board.appendChild(el);
    });
    document.getElementById('board-empty').style.display=opinions.length?'none':'flex';
    document.getElementById('op-count').textContent=opinions.length?`${opinions.length}件の意見`:'';
    setStatus(`${opinions.length}件の意見（5秒ごと自動更新）`,'');
  }catch(e){}
}

function drag(el){
  el.addEventListener('mousedown',e=>{
    e.preventDefault();
    const ox=e.clientX-el.offsetLeft,oy=e.clientY-el.offsetTop;el.style.zIndex=99;
    const mm=e2=>{el.style.left=(e2.clientX-ox)+'px';el.style.top=(e2.clientY-oy)+'px';};
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);el.style.zIndex='';};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
}

async function createSession(){
  const name=document.getElementById('sname').value.trim();if(!name)return;
  setStatus('作成中...','');
  try{
    const d=await api({action:'createSession',name});
    sessions.push({id:d.id,name:d.name});
    document.getElementById('sname').value='';
    renderChips();selectSession(d.id);
    setStatus(`セッション「${d.name}」を作成しました`,'success');
  }catch(e){setStatus('作成に失敗しました','error');}
}

async function deleteSession(id,name){
  if(!confirm(`「${name}」を削除しますか？\n意見データもすべて削除されます。`))return;
  try{
    await api({action:'deleteSession',sessionId:id});
    sessions=sessions.filter(s=>s.id!==id);
    if(activeId===id){
      activeId=null;
      clearInterval(refreshTimer);
      document.getElementById('board').querySelectorAll('.sticky').forEach(e=>e.remove());
      document.getElementById('board-empty').style.display='flex';
      document.getElementById('op-count').textContent='';
      document.getElementById('clear-btn').style.display='none';
    }
    renderChips();
    setStatus(`「${name}」を削除しました`,'success');
  }catch(e){setStatus('削除に失敗しました','error');}
}

async function clearOpinions(){
  if(!activeId||!confirm('このセッションの意見をすべて削除しますか？'))return;
  try{
    await api({action:'clearSession',sessionId:activeId});
    document.getElementById('board').querySelectorAll('.sticky').forEach(e=>e.remove());
    knownIds=new Set();
    document.getElementById('board-empty').style.display='flex';
    document.getElementById('op-count').textContent='';
    setStatus('意見をリセットしました','success');
  }catch(e){}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
loadSessions();
</script>
</body>
</html>
